<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 基本設定 -->
    <meta charset="utf-8">
    <title>互動教學簡報播放器</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- 核心資源預加載（與下方 link/script 的 crossorigin 一致，避免主控台警告） -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css" as="style" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/white.min.css" as="style" crossorigin>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js" as="script" crossorigin>

    <!-- 引入 Google Fonts：Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Klee+One&family=IBM+Plex+Sans+JP:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@400;500;700&family=Yusei+Magic&display=swap" rel="stylesheet">

    <!-- 核心 CSS：使用 white 主題（預設淺色），避免其他頁面被黑主題蓋住 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.css" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/theme/white.min.css" id="theme" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" crossorigin>
    
    <!-- Prism.js 程式碼語法高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" crossorigin>
    <link rel="stylesheet" href="player.css">

    <style>
        /* 共用樣式類別 - 減少內聯樣式重複 */
        .text-primary {
            color: var(--primary-color, #4aa3ff);
        }

        .text-center {
            text-align: center;
        }

        .text-large {
            font-size: 1.4rem;
            line-height: 2;
        }

        .text-medium {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .text-small {
            font-size: 1rem;
            line-height: 1.5;
        }

        .margin-bottom {
            margin-bottom: 1rem;
        }

        .margin-bottom-half {
            margin-bottom: 0.5rem;
        }

        .opacity-reduced {
            opacity: 0.8;
        }

        .font-weight-bold {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 歡迎頁（匯出單檔時先顯示，點「播放」後全螢幕簡報） -->
    <div id="welcome-screen" class="welcome-screen" style="display: none;">
        <div id="welcome-background" class="welcome-background"></div>
        <div class="welcome-content">
            <div id="welcome-text" class="welcome-text"></div>
            <button id="welcome-play-btn" class="welcome-play-btn" type="button">播放</button>
        </div>
    </div>

    <div class="reveal">
        <div class="slides" id="slides-container">
            <!-- 投影片會動態插入這裡 -->
        </div>
    </div>
    
    <!-- 左右翻頁按鈕 -->
    <button id="btn-prev" class="nav-arrow nav-arrow-left" title="上一頁">
        <i class="fas fa-chevron-left"></i>
    </button>
    <button id="btn-next" class="nav-arrow nav-arrow-right" title="下一頁">
        <i class="fas fa-chevron-right"></i>
    </button>
    
    <!-- 右上角：結束播放（打叉） -->
    <button id="btn-fullscreen" class="btn-fullscreen" title="全螢幕播放">
        <i class="fas fa-expand" aria-hidden="true"></i>
    </button>
    
    <!-- 底部導覽列 -->
    <div class="navigation-bar">
        <!-- 左側：章節圓形按鈕 -->
        <div class="nav-section nav-chapters">
            <div id="chapter-buttons" class="chapter-buttons">
                <!-- 章節按鈕會動態插入這裡 -->
            </div>
        </div>
        
        <!-- 中間：目前位置顯示 -->
        <div class="nav-section nav-center">
            <span id="current-info" class="current-info">1-1</span>
        </div>
        
        <!-- 右側：操作說明 -->
        <div class="nav-section nav-right">
            <button id="btn-help" class="btn-help" title="操作說明">
                <i class="fas fa-question-circle"></i>
            </button>
        </div>
    </div>
    
    <!-- 載入提示 -->
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>載入中...</p>
    </div>
    
    <!-- 操作提示 -->
    <div id="help-overlay" class="help-overlay">
        <div class="help-content">
            <h2>📖 操作說明</h2>
            <ul class="help-list">
                <li><strong>翻頁：</strong>使用鍵盤 <kbd>←</kbd> <kbd>→</kbd> 方向鍵，或點擊畫面左右兩側的箭頭按鈕</li>
                <li><strong>切換章節：</strong>點擊左下角的圓形數字按鈕</li>
                <li><strong>匯入專案：</strong>點擊右下角「匯入project.json」按鈕選擇 project.json 檔案</li>
                <li><strong>互動題目：</strong>點擊選項作答，可點擊「重新作答」重試</li>
                <li><strong>拖曳排序：</strong>拖曳項目進行排序，系統會自動檢查答案</li>
                <li><strong>全螢幕：</strong>點擊右上角全螢幕按鈕，按 <kbd>Esc</kbd> 可結束</li>
            </ul>
            <button id="btn-close-help" class="btn-close-help">我知道了</button>
        </div>
    </div>
    
    <!-- Prism.js 核心 + 常用語言 -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.3.1/reveal.min.js" crossorigin></script>
    <!-- Interact.js for drag order -->
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="player.js"></script>
